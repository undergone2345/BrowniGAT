dataset:
  nodes_path: data/vnext_toy/nodes.tsv
  edges_path: data/vnext_toy/edges.tsv
  perturbation_path: data/vnext_toy/perturbations.tsv
  spatial_path: data/vnext_toy/spatial_context.tsv
  drug_path: data/vnext_toy/drug_library.tsv
  disease_gene_path: data/vnext_toy/disease_signature.tsv

encoder:
  relation_weights:
    ppi: 1.0
    regulates: 0.9
    pathway_membership: 0.7
    disease_association: 0.85
    drug_target: 0.8
    celltype_expression: 0.75
    region_enrichment: 0.7
  propagation_steps: 2
  normalize_embeddings: true

targeting:
  target_genes:
    - TYR
    - MITF
    - UCP1
    - PPARGC1A

perturbation:
  feature_weights:
    disease_relevance: 0.35
    perturbation_support: 0.3
    pathway_support: 0.15
    cell_specificity: 0.2

spatial:
  disease_regions:
    - epidermis_edge
    - inflamed_melanocyte_niche
  disease_cell_types:
    - melanocyte
    - adipocyte

repurposing:
  disease_name: anti_browning

causal:
  uncertainty_penalty: 0.25

synbio:
  top_k_targets: 6
  max_targets_per_construct: 3
  editor_by_action:
    activate: CRISPRa
    repress: CRISPRi
  promoter_by_cell_type:
    melanocyte: TYRP1
    adipocyte: ADIPOQ
  default_promoter: EF1A
  delivery_system: lentiviral_pool
  assembly_strategy: GoldenGate
  construct_prefix: BrowniBuild
  uncertainty_penalty: 0.1

runtime:
  seed: 11
  output_dir_synbio: results_synbio
