foundation:
  source_bundle_dir: results_real_ingestion
  output_dir: results_foundation_workspace
  experiment:
    name: browning_foundation_pretraining_demo
    mode: research
  backbone:
    name: hetero_graph_transformer
    hidden_dim: 256
    num_layers: 6
  tokenizer:
    gene_symbol_case: upper
    split_characters: false
    reserve_special_tokens:
      - [PAD]
      - [MASK]
      - [CLS]
      - [EDGE]
      - [REGION]
  modalities:
    include:
      - drug_target
      - disease_gene
      - pathway
      - spatial
  tasks:
    enabled:
      - masked_node_modeling
      - masked_edge_modeling
      - cross_modal_alignment
      - perturbation_conditioning
      - spatial_context_prediction
    batch_size_per_task:
      masked_node_modeling: 256
      masked_edge_modeling: 256
      cross_modal_alignment: 192
      perturbation_conditioning: 128
      spatial_context_prediction: 128
  sampling:
    steps_per_epoch: 50
    task_temperature: 0.8
    shuffle_tasks_each_epoch: false
    repeat_strategy: round_robin
  dataloader:
    num_workers: 2
    pin_memory: false
    shuffle: false
    prefetch_factor: null
  distributed:
    world_size: 1
    global_rank: 0
    local_rank: 0
    backend: single_process
    gradient_sync: false
  data_partitioning:
    max_partition_size: 4
  curriculum:
    phases:
      - name: structure_warmup
        start_epoch: 1
        end_epoch: 1
        tasks:
          - masked_node_modeling
          - masked_edge_modeling
      - name: multimodal_mix
        start_epoch: 2
        tasks:
          - masked_node_modeling
          - masked_edge_modeling
          - cross_modal_alignment
          - perturbation_conditioning
          - spatial_context_prediction
  validation:
    max_batches_per_task: 2
  early_stopping:
    patience: 0
    min_delta: 0.0
    mode: min
  checkpoint_retention:
    keep_last_per_phase: 1
    keep_best: true
  experiment_scheduler:
    enabled: false
    execute_queue: true
    default_stage_epochs: 1
    failure_recovery:
      max_retries: 1
      resume_strategy: latest
  training:
    epochs: 3
    checkpoint_every: 1
    gradient_accumulation_steps: 2
    resume_from_checkpoint: null
    grad_clip_norm: null
    use_amp: false
    log_every_n_steps: 50
  optimizer:
    name: adamw
    lr: 0.0003
    weight_decay: 0.01
  scheduler:
    name: cosine_with_warmup
    warmup_steps: 20
    min_lr_ratio: 0.1
